<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>WAF Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <!-- Sidebar -->
  <div class="sidebar">
    <h2>🛡️ WAF</h2>
    <ul>
      <li onclick="scrollToSection('dashboard')">Dashboard</li>
      <li onclick="scrollToSection('logs')">Logs</li>
      <li onclick="scrollToSection('analytics')">Analytics</li>
    </ul>
  </div>

  <!-- Content -->
  <div class="content">
    <div class="main-content">

      <!-- DASHBOARD -->
      <h1 id="dashboard">Security Dashboard</h1>
      <h3 id="status"></h3>
      <p id="lastUpdated"></p>

      <!-- Cards -->
      <div class="cards" id="cards"></div>

      <!-- LOGS -->
      <div class="table-container" id="logs">
        <h2>Recent Attacks</h2>

        <div class="filter-box">
          <label>Filter:</label>
          <select id="filter">
            <option value="ALL">All</option>
            <option value="SQL Injection">SQL Injection</option>
            <option value="XSS">XSS</option>
            <option value="Brute Force">Brute Force</option>
          </select>
        </div>

        <p>Total Logs: <span id="logCount"></span></p>

        <table>
          <thead>
            <tr>
              <th>IP</th>
              <th>Attack</th>
              <th>Time</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>

      <!-- ANALYTICS -->
      <div class="attack-box" id="analytics">
        <h2>ATTACK DISTRIBUTION</h2>
        <h3 id="topAttack"></h3>
        <div id="attackBox"></div>
      </div>

      <!-- Footer -->
      <footer>
        <p>WAF Dashboard • Simple Project</p>
      </footer>

    </div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
